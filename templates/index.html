<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Score Line</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation"></script>
    <script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #eee;
            min-height: 100vh;
            padding: 20px;
        }
        h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #00d4ff;
        }
        .match-selector {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        .match-btn {
            padding: 12px 24px;
            border: 2px solid #00d4ff;
            background: transparent;
            color: #00d4ff;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }
        .match-btn:hover, .match-btn.active {
            background: #00d4ff;
            color: #1a1a2e;
        }
        .archive-select {
            padding: 12px 16px;
            border: 2px solid #00d4ff;
            background: #0f1a2e;
            color: #00d4ff;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
        }
        .archive-select:hover {
            background: #1a2a4e;
        }
        .chart-container {
            background: #16213e;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            max-width: 1200px;
            margin-left: auto;
            margin-right: auto;
        }
        .chart-wrapper {
            position: relative;
            height: 400px;
        }
        .tooltip-box {
            position: absolute;
            background: #0f3460;
            border: 1px solid #00d4ff;
            border-radius: 8px;
            padding: 12px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s;
            z-index: 100;
            min-width: 200px;
            max-width: calc(100vw - 20px);
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            font-size: 13px;
        }
        .tooltip-box.visible {
            opacity: 1;
        }
        .tooltip-box h3 {
            color: #00d4ff;
            margin-bottom: 10px;
            font-size: 14px;
        }
        .tooltip-box .status {
            color: #ffd700;
            margin-bottom: 10px;
            font-weight: bold;
        }
        .tooltip-box .innings {
            margin-bottom: 10px;
        }
        .tooltip-box .innings div {
            padding: 4px 0;
            border-bottom: 1px solid #1a1a2e;
        }
        .tooltip-box .odds-list {
            font-size: 13px;
        }
        .tooltip-box .odds-list div {
            display: flex;
            justify-content: space-between;
            padding: 3px 0;
        }
        .tooltip-box .odds-value {
            color: #00ff88;
            font-weight: bold;
        }
        .no-data {
            text-align: center;
            padding: 60px;
            color: #666;
            font-size: 18px;
        }
        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        #matchTitle {
            font-size: 18px;
            font-weight: bold;
            color: #00d4ff;
        }
        .refresh-indicator {
            font-size: 12px;
            color: #00ff88;
            background: #0f3460;
            padding: 6px 12px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .axis-toggle {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: #888;
        }
        .axis-toggle-btn {
            padding: 6px 12px;
            border: 1px solid #444;
            background: #0f3460;
            color: #888;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
        }
        .axis-toggle-btn.active {
            border-color: #00d4ff;
            color: #00d4ff;
            background: #1a3a5c;
        }
        .axis-toggle-btn:hover {
            border-color: #00d4ff;
        }
        .refresh-indicator::before {
            content: '';
            width: 8px;
            height: 8px;
            background: #00ff88;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        .legend-custom {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 15px;
            flex-wrap: wrap;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            cursor: pointer;
            user-select: none;
            transition: opacity 0.2s;
        }
        .legend-item:hover {
            opacity: 0.8;
        }
        .legend-item.hidden {
            opacity: 0.4;
            text-decoration: line-through;
        }
        .legend-color {
            width: 20px;
            height: 4px;
            border-radius: 2px;
        }
        /* Mobile tooltip below chart */
        .tooltip-mobile {
            display: none;
            background: #0f3460;
            border: 1px solid #00d4ff;
            border-radius: 8px;
            padding: 12px;
            margin-top: 15px;
            min-height: 60px;
            visibility: hidden;
        }
        .tooltip-mobile.has-content {
            visibility: visible;
        }
        .tooltip-mobile-content {
            display: flex;
            flex-wrap: wrap;
            gap: 8px 16px;
            font-size: 13px;
        }
        .tooltip-mobile-time {
            color: #00d4ff;
            font-weight: bold;
        }
        .tooltip-mobile-status {
            color: #ffd700;
        }
        .tooltip-mobile-innings {
            width: 100%;
            color: #ccc;
        }
        .tooltip-mobile-odds {
            width: 100%;
            display: flex;
            flex-wrap: wrap;
            gap: 8px 16px;
        }
        .tooltip-mobile-odds span {
            color: #00ff88;
        }
        /* Media query for mobile */
        @media (max-width: 768px) {
            .tooltip-box {
                display: none !important;
            }
            .tooltip-mobile {
                display: block;
            }
            .chart-wrapper {
                height: 300px;
            }
        }
    </style>
</head>
<body>
    <h1>The Score Line</h1>

    <div class="match-selector">
        {% for match in live_matches %}
        <button class="match-btn" data-match-id="{{ match.id }}">
            {{ match.name }}
        </button>
        {% endfor %}
        {% if archived_matches %}
        <select class="archive-select" id="archiveSelect">
            <option value="" disabled selected>Past Matches</option>
            {% for match in archived_matches %}
            <option value="{{ match.id }}">{% if match.end_date %}{% if match.end_date is string %}{{ match.end_date[5:] | replace('-', ' ') }}{% else %}{{ match.end_date.strftime('%m-%d') | replace('-', ' ') }}{% endif %}{% endif %} - {{ match.name }}</option>
            {% endfor %}
        </select>
        {% endif %}
    </div>

    <div class="chart-container">
        <div class="chart-header">
            <div class="axis-toggle">
                <span>X-Axis:</span>
                <button class="axis-toggle-btn active" data-mode="overs">Overs</button>
                <button class="axis-toggle-btn" data-mode="time">Time</button>
                <span style="margin-left: 15px;">Y-Axis:</span>
                <button class="axis-toggle-btn active" data-ymode="probability">%</button>
                <button class="axis-toggle-btn" data-ymode="odds">Odds</button>
                <button class="axis-toggle-btn" id="resetZoom" style="margin-left: 10px;">Reset Zoom</button>
            </div>
            <span class="refresh-indicator" id="refreshIndicator">Auto-refresh: 30s</span>
        </div>
        <div class="chart-wrapper">
            <canvas id="oddsChart"></canvas>
        </div>
        <div class="legend-custom" id="customLegend"></div>
        <div class="tooltip-mobile" id="tooltipMobile">
            <div class="tooltip-mobile-content">
                <span class="tooltip-mobile-time" id="tooltipMobileTime"></span>
                <span class="tooltip-mobile-status" id="tooltipMobileStatus"></span>
                <div class="tooltip-mobile-innings" id="tooltipMobileInnings"></div>
                <div class="tooltip-mobile-odds" id="tooltipMobileOdds"></div>
            </div>
        </div>
    </div>

    <div class="tooltip-box" id="tooltip">
        <h3 id="tooltipTime"></h3>
        <div class="status" id="tooltipStatus"></div>
        <div class="innings" id="tooltipInnings"></div>
        <div class="odds-list" id="tooltipOdds"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>
    <script>
        let chart = null;
        let matchData = null;
        let axisMode = 'overs'; // 'overs' or 'time'
        let yAxisMode = 'probability'; // 'probability' or 'odds'
        let hiddenSeries = new Set(); // Track which series are hidden
        const fallbackColors = ['#00d4ff', '#ff6b6b', '#ffd700', '#00ff88', '#ff00ff'];

        // Default team colors (used if not configured in admin)
        const defaultTeamColors = {
            'Australia': '#ffd700',      // Yellow
            'England': '#00d4ff',        // Blue
            'Draw': '#ff6b6b',           // Red
            'India': '#ff9933',          // Orange
            'South Africa': '#007a4d',   // Green
            'New Zealand': '#000000',    // Black
            'Pakistan': '#01411c',       // Dark Green
            'West Indies': '#7b0041',    // Maroon
            'Sri Lanka': '#003478',      // Navy
            'Bangladesh': '#006a4e'      // Bottle Green
        };

        function getColorForOutcome(outcome, index) {
            // First check if match data has configured colors
            if (matchData && matchData.match && matchData.match.outcome_colors) {
                const configured = matchData.match.outcome_colors[outcome];
                if (configured) return configured;
            }
            // Fall back to default team colors
            return defaultTeamColors[outcome] || fallbackColors[index % fallbackColors.length];
        }

        function toggleSeries(outcome) {
            if (hiddenSeries.has(outcome)) {
                hiddenSeries.delete(outcome);
            } else {
                hiddenSeries.add(outcome);
            }

            // Update chart dataset visibility
            if (chart) {
                const datasetIndex = chart.data.datasets.findIndex(ds => ds.label === outcome);
                if (datasetIndex !== -1) {
                    chart.data.datasets[datasetIndex].hidden = hiddenSeries.has(outcome);
                    chart.update('none');
                }
            }

            // Update legend item styling
            const legendItem = document.querySelector(`.legend-item[data-outcome="${outcome}"]`);
            if (legendItem) {
                legendItem.classList.toggle('hidden', hiddenSeries.has(outcome));
            }
        }

        async function loadMatch(matchId) {
            hiddenSeries.clear(); // Reset hidden series when loading new match
            const response = await fetch(`/api/match/${matchId}/history`);
            matchData = await response.json();
            renderChart();
        }

        function buildEventAnnotations(events, mode) {
            if (!events || !events.length || !matchData) return {};

            const annotations = {};
            events.forEach((event, i) => {
                // Find the corresponding data point to get timestamp for time mode
                let xValue = event.x;
                if (mode === 'time') {
                    // Find the point with matching x value to get its timestamp
                    const point = matchData.history.find(p => Math.abs(p.x - event.x) < 0.0001);
                    if (point) {
                        xValue = new Date(point.timestamp);
                    } else {
                        return; // Skip this annotation if we can't find matching point
                    }
                }

                // Determine border color - wickets use team color, innings use yellow
                let borderColor = '#ffd700';  // Default for innings
                if (event.type === 'wicket') {
                    borderColor = event.team ? getColorForOutcome(event.team, 0) : '#ff6b6b';
                }

                annotations[`event${i}`] = {
                    type: 'line',
                    xMin: xValue,
                    xMax: xValue,
                    z: event.type === 'innings' ? 10 : 1,  // Innings labels render on top of wicket lines
                    borderColor: borderColor,
                    borderWidth: event.type === 'wicket' ? 1 : 2,
                    borderDash: event.type === 'wicket' ? [5, 5] : [],
                    label: {
                        display: event.type === 'innings',
                        content: event.label,
                        position: 'start',
                        backgroundColor: '#ffd700',
                        color: '#1a1a2e',
                        font: { size: 10 }
                    }
                };
            });
            return annotations;
        }

        function renderChart() {
            if (!matchData || !matchData.history.length) {
                document.getElementById('oddsChart').style.display = 'none';
                return;
            }

            document.getElementById('oddsChart').style.display = 'block';

            // Get all unique outcomes
            const outcomes = new Set();
            matchData.history.forEach(point => {
                Object.keys(point.odds).forEach(o => outcomes.add(o));
            });
            let outcomeList = Array.from(outcomes);

            // Apply configured order if available
            if (matchData.match && matchData.match.outcome_order && matchData.match.outcome_order.length > 0) {
                const order = matchData.match.outcome_order;
                outcomeList.sort((a, b) => {
                    const idxA = order.indexOf(a);
                    const idxB = order.indexOf(b);
                    // If not in order list, put at end
                    if (idxA === -1 && idxB === -1) return 0;
                    if (idxA === -1) return 1;
                    if (idxB === -1) return -1;
                    return idxA - idxB;
                });
            }

            // Build datasets - use overs or time based on mode
            const datasets = outcomeList.map((outcome, i) => {
                const color = getColorForOutcome(outcome, i);
                const isHidden = hiddenSeries.has(outcome);
                return {
                    label: outcome,
                    data: matchData.history.map(point => ({
                        x: axisMode === 'overs' ? point.x : new Date(point.timestamp),
                        y: yAxisMode === 'probability'
                            ? (point.odds[outcome]?.implied_probability || null)
                            : (point.odds[outcome]?.odds || null),
                        meta: point
                    })),
                    borderColor: color,
                    backgroundColor: color + '20',
                    tension: 0.3,
                    pointRadius: 0,
                    pointHoverRadius: 6,
                    fill: false,
                    spanGaps: true,
                    hidden: isHidden
                };
            });

            // Update legend
            const legendHtml = outcomeList.map((outcome, i) => `
                <div class="legend-item${hiddenSeries.has(outcome) ? ' hidden' : ''}" data-outcome="${outcome}">
                    <div class="legend-color" style="background: ${getColorForOutcome(outcome, i)}"></div>
                    <span>${outcome}</span>
                </div>
            `).join('');
            document.getElementById('customLegend').innerHTML = legendHtml;

            // Add legend click handlers
            document.querySelectorAll('.legend-item[data-outcome]').forEach(item => {
                item.addEventListener('click', function() {
                    const outcome = this.dataset.outcome;
                    toggleSeries(outcome);
                });
            });

            if (chart) {
                chart.destroy();
            }

            const ctx = document.getElementById('oddsChart').getContext('2d');
            chart = new Chart(ctx, {
                type: 'line',
                data: { datasets },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: {
                        mode: 'index',
                        intersect: false
                    },
                    plugins: {
                        legend: {
                            display: false
                        },
                        annotation: {
                            annotations: buildEventAnnotations(matchData.events, axisMode)
                        },
                        zoom: {
                            pan: {
                                enabled: true,
                                mode: 'x',
                            },
                            zoom: {
                                wheel: {
                                    enabled: true,
                                },
                                pinch: {
                                    enabled: true,
                                },
                                mode: 'x',
                            }
                        },
                        tooltip: {
                            enabled: false,
                            external: function(context) {
                                const tooltip = document.getElementById('tooltip');
                                const isMobile = window.innerWidth <= 768;

                                if (context.tooltip.opacity === 0) {
                                    tooltip.classList.remove('visible');
                                    return;
                                }

                                const dataPoint = context.tooltip.dataPoints[0];
                                if (!dataPoint) return;

                                const meta = dataPoint.raw.meta;
                                const time = new Date(meta.timestamp).toLocaleString();

                                // Filter out template placeholders from status
                                let status = meta.status || '';
                                if (status.includes('{{') || status.includes('}}')) {
                                    status = '';
                                }

                                // Build innings text
                                let inningsHtml = '';
                                if (meta.innings && meta.innings.length) {
                                    meta.innings.forEach(inn => {
                                        inningsHtml += `<div>${inn.team}: ${inn.runs}/${inn.wickets} (${inn.overs} ov)</div>`;
                                    });
                                }

                                // Build odds text with team colors
                                let oddsHtml = '';
                                let idx = 0;
                                Object.entries(meta.odds).forEach(([outcome, data]) => {
                                    const color = getColorForOutcome(outcome, idx);
                                    oddsHtml += `<span style="color: ${color}">${outcome}: $${data.odds.toFixed(2)} (${data.implied_probability}%)</span>`;
                                    idx++;
                                });

                                if (isMobile) {
                                    // Update mobile tooltip below chart
                                    document.getElementById('tooltipMobileTime').textContent = time;
                                    document.getElementById('tooltipMobileStatus').textContent = status || 'Pre-match';
                                    document.getElementById('tooltipMobileInnings').innerHTML = inningsHtml;
                                    document.getElementById('tooltipMobileOdds').innerHTML = oddsHtml;
                                    document.getElementById('tooltipMobile').classList.add('has-content');
                                } else {
                                    // Position desktop tooltip
                                    const position = context.chart.canvas.getBoundingClientRect();
                                    let left = position.left + window.scrollX + context.tooltip.caretX + 15;
                                    let top = position.top + window.scrollY + context.tooltip.caretY - 15;

                                    if (left + 270 > window.innerWidth) {
                                        left = position.left + window.scrollX + context.tooltip.caretX - 270;
                                    }
                                    if (left < 10) left = 10;
                                    if (top < 10) {
                                        top = position.top + window.scrollY + context.tooltip.caretY + 20;
                                    }

                                    tooltip.style.left = left + 'px';
                                    tooltip.style.top = top + 'px';

                                    document.getElementById('tooltipTime').textContent = time;
                                    document.getElementById('tooltipStatus').textContent = status || 'Pre-match';
                                    document.getElementById('tooltipInnings').innerHTML = inningsHtml;

                                    let desktopOddsHtml = '';
                                    let desktopIdx = 0;
                                    Object.entries(meta.odds).forEach(([outcome, data]) => {
                                        const color = getColorForOutcome(outcome, desktopIdx);
                                        desktopOddsHtml += `
                                            <div>
                                                <span style="color: ${color}">${outcome}</span>
                                                <span class="odds-value" style="color: ${color}">$${data.odds.toFixed(2)} (${data.implied_probability}%)</span>
                                            </div>
                                        `;
                                        desktopIdx++;
                                    });
                                    document.getElementById('tooltipOdds').innerHTML = desktopOddsHtml;

                                    tooltip.classList.add('visible');
                                }
                            }
                        }
                    },
                    scales: {
                        x: axisMode === 'overs' ? {
                            type: 'linear',
                            grid: {
                                color: '#333'
                            },
                            ticks: {
                                color: '#888',
                                callback: function(value) {
                                    // Find which innings this value is in and show innings-relative overs
                                    const boundaries = matchData.innings_boundaries || [0];
                                    let inningsStart = 0;
                                    for (let i = boundaries.length - 1; i >= 0; i--) {
                                        // Use > so last ball of innings N stays in innings N
                                        if (value > boundaries[i]) {
                                            inningsStart = boundaries[i];
                                            break;
                                        }
                                    }
                                    const inningsOvers = value - inningsStart;
                                    const overs = Math.floor(inningsOvers);
                                    return overs.toString();
                                }
                            },
                            title: {
                                display: true,
                                text: 'Overs',
                                color: '#888'
                            }
                        } : {
                            type: 'time',
                            time: {
                                displayFormats: {
                                    minute: 'HH:mm',
                                    hour: 'HH:mm'
                                }
                            },
                            grid: {
                                color: '#333'
                            },
                            ticks: {
                                color: '#888'
                            },
                            title: {
                                display: true,
                                text: 'Time',
                                color: '#888'
                            }
                        },
                        y: yAxisMode === 'probability' ? {
                            min: 0,
                            max: 100,
                            grid: {
                                color: '#333'
                            },
                            ticks: {
                                color: '#888',
                                callback: value => value + '%'
                            },
                            title: {
                                display: true,
                                text: 'Implied Probability',
                                color: '#888'
                            }
                        } : {
                            min: 1,
                            grid: {
                                color: '#333'
                            },
                            ticks: {
                                color: '#888',
                                callback: value => '$' + value.toFixed(2)
                            },
                            title: {
                                display: true,
                                text: 'Odds',
                                color: '#888'
                            }
                        }
                    }
                }
            });
        }

        // Auto-refresh
        let currentMatchId = null;
        let refreshInterval = null;
        const REFRESH_SECONDS = 30;

        async function refreshData() {
            if (!currentMatchId) return;

            const response = await fetch(`/api/match/${currentMatchId}/history`);
            const newData = await response.json();

            // Only update if data changed
            if (JSON.stringify(newData) !== JSON.stringify(matchData)) {
                matchData = newData;
                updateChart();
            }
        }

        function updateChart() {
            if (!chart || !matchData || !matchData.history.length) return;

            // Get all unique outcomes
            const outcomes = new Set();
            matchData.history.forEach(point => {
                Object.keys(point.odds).forEach(o => outcomes.add(o));
            });
            let outcomeList = Array.from(outcomes);

            // Apply configured order if available
            if (matchData.match && matchData.match.outcome_order && matchData.match.outcome_order.length > 0) {
                const order = matchData.match.outcome_order;
                outcomeList.sort((a, b) => {
                    const idxA = order.indexOf(a);
                    const idxB = order.indexOf(b);
                    if (idxA === -1 && idxB === -1) return 0;
                    if (idxA === -1) return 1;
                    if (idxB === -1) return -1;
                    return idxA - idxB;
                });
            }

            // Update each dataset
            outcomeList.forEach((outcome, i) => {
                if (chart.data.datasets[i]) {
                    chart.data.datasets[i].data = matchData.history.map(point => ({
                        x: axisMode === 'overs' ? point.x : new Date(point.timestamp),
                        y: yAxisMode === 'probability'
                            ? (point.odds[outcome]?.implied_probability || null)
                            : (point.odds[outcome]?.odds || null),
                        meta: point
                    }));
                }
            });

            // Update event annotations
            chart.options.plugins.annotation.annotations = buildEventAnnotations(matchData.events, axisMode);

            chart.update('none'); // Update without animation for smoother feel
        }

        function startAutoRefresh() {
            if (refreshInterval) clearInterval(refreshInterval);
            refreshInterval = setInterval(refreshData, REFRESH_SECONDS * 1000);
            updateRefreshIndicator();
        }

        function updateRefreshIndicator() {
            const indicator = document.getElementById('refreshIndicator');
            if (indicator) {
                indicator.textContent = `Auto-refresh: ${REFRESH_SECONDS}s`;
            }
        }

        // Event listeners
        document.querySelectorAll('.match-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.match-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentMatchId = this.dataset.matchId;
                loadMatch(currentMatchId);
                startAutoRefresh();
                // Reset archive dropdown
                const archiveSelect = document.getElementById('archiveSelect');
                if (archiveSelect) archiveSelect.selectedIndex = 0;
            });
        });

        // X-axis toggle listeners
        document.querySelectorAll('.axis-toggle-btn[data-mode]').forEach(btn => {
            btn.addEventListener('click', function() {
                const mode = this.dataset.mode;
                if (mode === axisMode) return; // Already in this mode

                axisMode = mode;
                document.querySelectorAll('.axis-toggle-btn[data-mode]').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                renderChart();
            });
        });

        // Y-axis toggle listeners
        document.querySelectorAll('.axis-toggle-btn[data-ymode]').forEach(btn => {
            btn.addEventListener('click', function() {
                const mode = this.dataset.ymode;
                if (mode === yAxisMode) return; // Already in this mode

                yAxisMode = mode;
                document.querySelectorAll('.axis-toggle-btn[data-ymode]').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                renderChart();
            });
        });

        // Reset zoom button
        document.getElementById('resetZoom').addEventListener('click', function() {
            if (chart) {
                chart.resetZoom();
            }
        });

        // Archive dropdown listener
        const archiveSelect = document.getElementById('archiveSelect');
        if (archiveSelect) {
            archiveSelect.addEventListener('change', function() {
                const matchId = this.value;
                if (!matchId) return;

                // Deselect all buttons
                document.querySelectorAll('.match-btn').forEach(b => b.classList.remove('active'));

                // Load the archived match
                currentMatchId = matchId;
                loadMatch(matchId);

                // Stop auto-refresh for archived matches
                if (refreshInterval) {
                    clearInterval(refreshInterval);
                    document.getElementById('refreshIndicator').textContent = 'Archived';
                }
            });
        }

        // Load first match by default
        const firstBtn = document.querySelector('.match-btn');
        if (firstBtn) {
            firstBtn.click();
        }
    </script>
</body>
</html>
